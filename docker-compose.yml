services:
  db:
    image: postgres:16-alpine
    container_name: estoque_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-estoque_db}
      POSTGRES_USER: ${POSTGRES_USER:-estoque_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-estoque_pass}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-estoque_user} -d ${POSTGRES_DB:-estoque_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
